name: Format and Build

on:
  pull_request:
    branches: [ 'main' ]
  push:
    branches: [ 'main' ]

jobs:
  format-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Verify whitespace formatting (dotnet format)
        run: dotnet format whitespace --verify-no-changes

      - name: Build solution
        run: dotnet build "ContestLogProcessor.slnx" --configuration Release
